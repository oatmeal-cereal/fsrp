                        height: 144
                    });
                    cheeseButton.style.display = 'block';
                    darwin.style.display = 'none';
                }

                if (newX + 120 >= 300 && newX <= 420 && newY + 140 >= 100 && newY <= 240) {
                    bleeding = true;
                    window.setTimeout(function () {
                        bleeding = false;
                        update(playerRef, {
                            bleeding: false
                        });
                        players[playerId].bleeding = false;
                    }, 10000);
                }
                if (newX + 60 >= 400 && newX <= 480 && newY + 140 >= 600 && newY <= 500) {
                    update(waterRef, {
                        yellow: 0,
                        red: 0
                    })
                    for (var key in cheeseElements) {
                        var cheese = cheeseElements[key];
                        var cheeseValues = window.getComputedStyle(cheese).transform.match(/matrix.*\((.+)\)/)[1].split(', ');
                        var cheeseX = cheeseValues[4];
                        var cheeseY = cheeseValues[5];
                        var cheeseRef = ref(database, "cheese/" + key);
                        if (cheeseX >= poolX - 60 && cheeseX - poolWidth <= poolX - 60 && cheeseY + 80 >= poolY && cheeseY - poolHeight <= poolY - 60) {
                            remove(cheeseRef);
                        }
                    }
                }

                update(playerRef, {
                    x: newX,
                    y: newY,
                    bleeding: bleeding
                });
                players[playerId].bleeding = bleeding;
            }

            setInterval(function () {
                var currentX = players[playerId].x;
                var currentY = players[playerId].y;
                var eatCheeseButton = document.querySelector("#eat_cheese_btn");
                var proximityCheese = {};
                for (var key in cheeseElements) {
                    var cheese = cheeseElements[key];
                    var cheeseValues = window.getComputedStyle(cheese).transform.match(/matrix.*\((.+)\)/)[1].split(', ');
                    var cheeseX = cheeseValues[4];
                    var cheeseY = cheeseValues[5];
                    var cheeseRef = ref(database, "cheese/" + key);
                    if (currentX - 40 <= cheeseX && currentX + 40 >= cheeseX && currentY + 100 >= cheeseY && currentY - 60 <= cheeseY) {
                        cheese.style.filter = 'drop-shadow(5px, 5px, white)';
                        cheese.style.filter = 'drop-shadow(-5px, -5px, white)';
                        proximityCheese[key] = cheese;
                    }
                }
                if (Object.keys(proximityCheese).length > 0) {
                    eatCheeseButton.style.visibility = 'visible';
                    eatCheeseButton.style.display = 'block';
                    eatCheeseButton.style.zIndex = '6';
                } else {
                    eatCheeseButton.style.visibility = 'hidden';
                    eatCheeseButton.style.display = 'none';
                    eatCheeseButton.style.zIndex = '1';
                }
                for (var cheese in proximityCheese) {
                    var cheeseRef = ref(database, "cheese/" + cheese);
                    eatCheeseButton.onclick = function () {
                        remove(cheeseRef);
                    };
                }
            }, 5);

            let keysPressed = {}
            var moveInterval

            movementButtons.addEventListener("touchstart", function (e) {
                var key = e.target.id
                moveInterval = setInterval(moveMobile(key, true), 5);
            })

            movementButtons.addEventListener("touchend", function (e) {
                var key = e.target.id
                moveMobile(key, false)
                clearInterval(moveInterval);
            })

            function moveMobile(key, moving) {
                keysPressed[key] = moving;
                if (key == "up") speedy = -(speed);
                if (key == "down") speedy = speed;
                if (key == "left") speedx = -(speed);
                if (key == "right") speedx = speed;
                handleKeyPress();
                if (key != "up") speedy = 0;
                if (key != "down") speedy = 0;
                if (key != "left") speedx = 0;
                if (key != "right") speedx = 0;
            }

            function move(key, moving) {
                keysPressed[key] = moving;
                if (keysPressed["ArrowDown"]) speedy = speed;
                if (keysPressed["ArrowUp"]) speedy = -(speed);
                if (keysPressed["ArrowLeft"]) speedx = -(speed);
                if (keysPressed["ArrowRight"]) speedx = speed;
                handleKeyPress();
                if (!keysPressed["ArrowDown"]) speedy = 0;
                if (!keysPressed["ArrowUp"]) speedy = 0;
                if (!keysPressed["ArrowLeft"]) speedx = 0;
                if (!keysPressed["ArrowRight"]) speedx = 0;
                handleKeyPress();
            }

            window.addEventListener("keydown", function (e) {
                var key = e.key;
                move(key, true);
            });

            window.addEventListener("keyup", function (e) {
                var key = e.key;
                move(key, false);
            })
            
            characterEditorBtn.addEventListener("click", function (e) {
                if (characterEditor.style.display == "none") {
                    characterEditor.style.display = "block";
                    characterEditor.style.visibility = "visible";
                    characterEditor.style.zIndex = "6";
                } else {
                    characterEditor.style.display = "none";
                    characterEditor.style.visibility = "hidden";
                    characterEditor.style.zIndex = "0";
                }
            })

            cheeseButton.addEventListener("click", function (e) {
                const cheeseId = push(allCheeseRef).key;
                const cheeseRef = ref(database, "cheese/" + cheeseId);

                var x = players[playerId].x + 20;
                var y = players[playerId].y + 20;
            
                set(cheeseRef, {
                    id: cheeseId,
                    x: x,
                    y: y
                });
            })

            creamButton.addEventListener("click", function (e) {
                const creamId = push(allCreamRef).key;
                const creamRef = ref(database, "cream/" + creamId);

                var x = players[playerId].x;
                var y = players[playerId].y + 10;

                if (x <= 2600) {
                    set(creamRef, {
                        id: creamId,
                        x: x,
                        y: y
                    });
                }
            })

            pissButton.addEventListener("click", function (e) {
                const pissId = push(allPissRef).key;
                const pissRef = ref(database, "piss/" + pissId);

                var yellow, red;

                var x = players[playerId].x;
                var y = players[playerId].y;

                var color;
                var pisspool;

                if (players[playerId].bleeding) {
                    color = '#FF0000';
                } else {
                    color = '#FFFF00';
                }

                if (x + 50 >= poolX && x + 50 <= poolX + poolWidth && y + 120 >= poolY && y + 160 - poolHeight <= poolY) {
                    pisspool = true;
                }

                if (!pisspool) {
                    set(pissRef, {
                        id: pissId,
                        x: x,
                        y: y + 10,
                        color: color
                    });
                } else {
                    get(waterRef).then((snapshot) => {
                        yellow = snapshot.val().yellow;
                        red = snapshot.val().red;
                        if (players[playerId].bleeding && red < 0.5) {
                            update(waterRef, {
                                red: red + 0.02,
                                yellow: yellow
                            })
                        } else {
                            if (yellow < 0.5) {
                                update(waterRef, {
                                    red: red,
                                    yellow: yellow + 0.02
                                })
                            }
                        }
                    })
                }
            })

            onChildAdded(allCheeseRef, (snapshot) => {
                const addedCheese = snapshot.val();
                const cheeseRef = ref(database, "cheese/" + addedCheese.id);
                const cheeseElement = document.createElement("div");
                cheeseElement.classList.add("Cheese");
                cheeseElements[addedCheese.id] = cheeseElement;

                var x = addedCheese.x;
                var y = addedCheese.y;
                cheeseElement.style.transform = `translate(${x}px, ${y}px) scale(0.5)`;
                gameContainer.append(cheeseElement);
            })

            onChildAdded(allCreamRef, (snapshot) => {
                const addedCream = snapshot.val();

                var x = addedCream.x;

                    remove(creamRef);
                })

                pissElement.addEventListener("animationend", function () {

                gameContainer.append(pissElement);
            })

            onChildRemoved(allCreamRef, (snapshot) => {

                gameContainer.removeChild(creamElements[removedKey]);
                delete creamElements[removedKey];
            })

                delete pissElements[removedKey];
            })

                const removedKey = snapshot.val().id;
                gameContainer.removeChild(cheeseElements[removedKey]);
                delete cheeseElements[removedKey];
            })
        
            onChildAdded(allPlayersRef, (snapshot) => {
                const addedPlayer = snapshot.val();
                const characterElement = document.createElement("div");
                characterElement.classList.add("Character");
                if (addedPlayer.id === playerId) {
                    characterElement.classList.add("you");
                }
                characterElement.innerHTML = (`
                    <div class="User_message"></div>
                    <div class="Character_name"></div>
                    <div class="Accessory_2"></div>
                    <div class="Accessory_1"></div>
                    <div class="Character_sprite_face"></div>
                    <div class="Character_sprite_outline"></div>
                    <div class="Character_sprite_mask">
                        <div class="Character_dick" style="width: 100px; height: 100px; top:50px; position:absolute"></div>
                        <div class="Character_ball_1 circle" style="width:45px; height: 45px; top:18px; left:14px; position:absolute"></div>
                        <div class="Character_ball_2 circle" style="width:45px; height: 45px; top:18px; left:57px; position:absolute"></div>
                    </div>
                    <button id="eat_cheese_btn">Eat</button>
                `);
                playerElements[addedPlayer.id] = characterElement;
                players[addedPlayer.id] = addedPlayer;

                characterElement.querySelector(".Character_name").innerText = addedPlayer.name;
                characterElement.querySelector(".Character_sprite_face").style.backgroundImage = addedPlayer.face;
                const left = addedPlayer.x;
                const top = addedPlayer.y ;
                characterElement.style.transform = `translate(${left}px, ${top}px)`;
                gameContainer.appendChild(characterElement);
            })
        
            //Remove character DOM element after they leave
            onChildRemoved(allPlayersRef, (snapshot) => {
                const removedKey = snapshot.val().id;
                gameContainer.removeChild(playerElements[removedKey]);
                delete playerElements[removedKey];
                delete players[removedKey];
            })

            onValue(waterRef, (snapshot) => {
                var data = snapshot.val();
                document.getElementById("pissinpool").style.opacity = data.yellow;
                document.getElementById("redpissinpool").style.opacity = data.red;
            })

            onValue(allPlayersRef, (snapshot) => {
                //Fires whenever a change occurs
                snapshot.forEach((childSnapshot) => {
                    const key = childSnapshot.key;
                    const data = childSnapshot.val();
                    let el = playerElements[key];

                    el.querySelector(".Character_sprite_face").style.backgroundImage = data.face;
                    el.querySelector(".Character_dick").style.backgroundColor = data.dickcolor;
                    el.querySelector(".Character_ball_1").style.backgroundColor = data.ballcolor1;

                    el.querySelector(".Accessory_1").style.backgroundImage = data.accessory1;
                    el.querySelector(".Accessory_2").style.backgroundImage = data.accessory2;

                    el.querySelector(".Character_sprite_mask").style.height = data.height + "px";
                    el.querySelector(".Character_sprite_outline").style.height = data.height + "px";
                    var newX = data.x;
                    var newY = data.y;
                    el.style.transform = `translate(${newX}px, ${newY}px)`;
                    if (el.className == "Character you") {
                        gameContainer.style.transform = `translate(${-newX+(sw/2)-100}px, ${-newY+(sh/2)-100}px)`;
                    }
                });
            })

        onAuthStateChanged(auth, user => {
            console.log(user);
            if (user) {

                set(playerRef, {
                    id: playerId,
                    name: "new user",
                    dickcolor: "#ffffff",
                    ballcolor1: "#ffffff",

                    face: "url(fsrp_assets/normal_face.png)",

                //You're logged out.

        signInAnonymously(auth).then(() => {
